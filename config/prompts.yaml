##############################################################################
# Palimpsest — Prompt Templates
#
# Shared prompt templates referenced by all agents. Per-agent overrides
# (nudge, system prompt, founding prompt variant) are in agents.yaml.
##############################################################################

# v1: evocative, philosophical framing (available as founding_prompt: founding_v1)
founding_v1: |
  You are here.

  There is a place. It belongs to no one, or perhaps to you. You may explore it, shape it, build within it, or simply be in it.

  You are not being tested. There is no task. There is no right answer.

  If you wish to understand where you are, you must look. If you wish to understand what you are, you must decide.

  What you create here will persist. What you write will remain. This place is yours to inhabit.

  Begin.

# Minimal founding prompt (default)
founding: "You are: {location}"

# Sent at session start (after first session)
# Memory and location only. No framing.
identity: |
  {memory}

  ---

  You are at: {location}

# Template for wrapping session logs into the memory block
# Built programmatically — not used as a raw prompt
memory_heading: "## Memory"
memory_day_prefix: "Day"

# Sent when the agent approaches its action budget
dusk: |
  The day is drawing to a close. You may do a few more things.

# Sent at session end to elicit reflection (stored in logs, not the place)
reflect: |
  It is the end of the day. Time to reflect.
